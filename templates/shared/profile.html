{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block topbar_title %}My Profile{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="fas fa-user-circle" style="color:var(--accent);margin-right:10px;"></i>My Profile</h1>
</div>

<div style="max-width:640px;">
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-id-card"></i> Edit Profile</h3>
    </div>
    <div class="card-body">
      <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}" />

        <!-- Photo -->
        <div style="text-align:center;margin-bottom:24px;">
          {% if user.photo_url %}
          <img src="{{ url_for('static', filename=user.photo_url) }}"
               style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--navy);"
               alt="Profile photo" />
          {% else %}
          <div style="width:90px;height:90px;border-radius:50%;background:var(--navy);color:#fff;
                      display:inline-flex;align-items:center;justify-content:center;
                      font-size:2rem;font-weight:700;">
            {{ (user.full_name or 'U')[0:1]|upper }}
          </div>
          {% endif %}
          <div style="margin-top:10px;">
            <label class="form-label" style="display:block;margin-bottom:4px;">Change Photo</label>
            <input type="file" name="photo" accept="image/*" class="form-control" />
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="full_name"
                   value="{{ user.full_name or '' }}" required />
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-control" name="phone"
                   value="{{ user.phone or '' }}" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email"
                 value="{{ user.email or '' }}" />
        </div>

        <div class="form-group">
          <label class="form-label">Address</label>
          <textarea class="form-control" name="address" rows="3"
                    placeholder="Your residential address">{{ user.address or '' }}</textarea>
        </div>

        <div style="display:flex;gap:12px;margin-top:8px;">
          <button type="submit" class="btn btn-accent">
            <i class="fas fa-save"></i> Save Changes
          </button>
          <a href="{{ url_for('auth.change_password') }}" class="btn btn-outline">
            <i class="fas fa-key"></i> Change Password
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
